<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아기 개월별 식단 추천</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <button id="theme-toggle" class="theme-toggle">다크 모드</button>
        <h1>아기 개월별 식단 추천</h1>
        <div class="input-container">
            <input type="number" id="age-input" placeholder="아기 개월 수를 입력하세요" min="0">
            <button id="recommend-button">추천 받기</button>
        </div>
        <div id="recommendation-container"></div>

        <section class="partnership-section">
            <hr>
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mykbqwej" method="POST" id="partnership-form">
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" name="email" id="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea name="message" id="message" rows="4" placeholder="제휴 제안 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" id="submit-button">문의 보내기</button>
            </form>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
